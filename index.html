<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายงานคุณภาพอากาศ - ปากเกร็ด</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f0f2f5; }
        .header-bg {
            background-color: #4a628a;
            background-image: radial-gradient(#ffffff33 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .aqi-blue   { background-color: #a5f3fc; }
        .aqi-green  { background-color: #86efac; }
        .aqi-yellow { background-color: #fde047; }
        .aqi-orange { background-color: #fdba74; }
        .aqi-red    { background-color: #fca5a5; }
    </style>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // ======================================================
        //  🔧 ใส่ Firebase Config ของคุณตรงนี้
        // ======================================================
        const firebaseConfig = {
            apiKey: "AIzaSyDFGlYDg8n7jJMOehSriF4o1rZM1aHR2uY",
            authDomain: "city-prototype.firebaseapp.com",
            projectId: "city-prototype",
            storageBucket: "city-prototype.firebasestorage.app",
            messagingSenderId: "587922189632",
            appId: "1:587922189632:web:e13e821623b81209465ea5",
            measurementId: "G-QYNEVNZHD4"
        };
        // ======================================================

        const app = initializeApp(firebaseConfig);
        const db  = getFirestore(app);

        function getColorClass(value) {
            if (value <= 15) return 'aqi-blue';
            if (value <= 25) return 'aqi-green';
            if (value <= 37) return 'aqi-yellow';
            if (value <= 75) return 'aqi-orange';
            return 'aqi-red';
        }

        function renderData(docs) {
            const list = document.getElementById('dataList');
            list.innerHTML = '';

            if (docs.length === 0) {
                list.innerHTML = '<div class="text-center py-10 text-gray-400">ไม่พบข้อมูลใน Firestore</div>';
                return;
            }

            // เรียงตาม point_id
            docs.sort((a, b) => (a.point_id ?? 0) - (b.point_id ?? 0));

            docs.forEach(item => {
                const val   = item.final_value ?? item.raw_value ?? 0;
                const name  = item.point_name ?? '-';
                const unit  = item.unit ?? 'µg/m3';
                const color = getColorClass(val);

                const row = document.createElement('div');
                row.className = 'flex items-center gap-2';
                row.innerHTML = `
                    <div class="w-4 h-4 rounded-full bg-black shadow-inner flex-shrink-0"></div>
                    <div class="${color} w-28 md:w-36 py-2 px-3 rounded-full text-center font-bold shadow-sm border border-gray-200 flex-shrink-0 text-sm">
                        ${val} ${unit}
                    </div>
                    <div class="${color} flex-1 py-2 px-4 rounded-full font-medium shadow-sm border border-gray-200 flex justify-between items-center min-w-0">
                        <span class="truncate text-sm">${name}</span>
                        <span class="text-xs ml-1 flex-shrink-0">🔍</span>
                    </div>
                `;
                list.appendChild(row);
            });

            // อัปเดตเวลาล่าสุดที่ดึงข้อมูล
            document.getElementById('lastFetch').innerText =
                'อัปเดตล่าสุด: ' + new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        async function fetchFirestore() {
            document.getElementById('dataList').innerHTML =
                '<div class="text-center py-10 text-gray-400">กำลังโหลดข้อมูล...</div>';
            try {
                const col  = collection(db, "air_monitoring");
                const snap = await getDocs(col);
                const docs = snap.docs.map(d => d.data());
                renderData(docs);
            } catch (err) {
                console.error("Firestore error:", err);
                document.getElementById('dataList').innerHTML =
                    `<div class="text-center py-10 text-red-400">⚠️ ดึงข้อมูลไม่สำเร็จ<br><span class="text-xs">${err.message}</span></div>`;
            }
        }

        function updateDateTime() {
            const now = new Date();
            const thaiMonths = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน",
                                "กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
            const day   = String(now.getDate()).padStart(2, '0');
            const month = thaiMonths[now.getMonth()];
            const year  = now.getFullYear() + 543;
            const time  = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', hour12: false });
            document.getElementById('currentDate').innerText = `${day} ${month} ${year}`;
            document.getElementById('currentTime').innerText = `${time} น.`;
        }

        // Init
        setInterval(updateDateTime, 1000);
        updateDateTime();
        fetchFirestore();
        // รีเฟรชข้อมูลทุก 5 นาที
        setInterval(fetchFirestore, 5 * 60 * 1000);
    </script>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-2xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden border-4 border-white">

        <!-- Header -->
        <div class="header-bg p-6 text-white text-center">
            <h1 class="text-3xl font-bold mb-4 tracking-wide">รายงานคุณภาพอากาศ</h1>
            <div class="flex flex-wrap justify-between items-center text-sm md:text-base px-2 gap-2">
                <div class="flex items-center gap-1">
                    <span id="currentDate">-- ---- ----</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-xl">🕒</span>
                    <span id="currentTime" class="font-bold text-xl">00:00 น.</span>
                </div>
                <div class="flex items-center gap-1">
                    <span class="text-red-400">📍</span>
                    <span>ปากเกร็ด ; นนทบุรี</span>
                </div>
            </div>
        </div>

        <!-- Data List -->
        <div class="p-6 space-y-3 bg-gray-100" id="dataList">
            <div class="text-center py-10 text-gray-400">กำลังโหลดข้อมูล...</div>
        </div>

        <!-- Footer -->
        <div class="p-6 bg-white border-t border-gray-200">
            <div class="flex gap-1 h-6 rounded-full overflow-hidden mb-3">
                <div class="bg-cyan-300 w-1/5 text-[10px] flex items-center justify-center font-bold">≤ 15</div>
                <div class="bg-green-400 w-1/5 text-[10px] flex items-center justify-center font-bold">≤ 25</div>
                <div class="bg-yellow-400 w-1/5 text-[10px] flex items-center justify-center font-bold">≤ 37.5</div>
                <div class="bg-orange-400 w-1/5 text-[10px] flex items-center justify-center font-bold">≤ 75</div>
                <div class="bg-red-500 w-1/5 text-[10px] flex items-center justify-center font-bold text-white">> 75</div>
            </div>
            <p id="lastFetch" class="text-[10px] text-gray-400 text-center mb-1">อัปเดตล่าสุด: -</p>
            <p class="text-[10px] text-gray-400 text-center">ข้อมูลโดย: Firebase Firestore / air_monitoring</p>
        </div>

    </div>
</body>
</html>
