<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายงานคุณภาพอากาศ - ปากเกร็ด</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #f0f2f5;
        }
        .header-bg {
            background-color: #4a628a;
            background-image: radial-gradient(#ffffff33 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .status-card {
            transition: all 0.3s ease;
        }
        /* Color Mapping Classes */
        .aqi-blue { background-color: #a5f3fc; } /* < 15 */
        .aqi-green { background-color: #86efac; } /* 16-25 */
        .aqi-yellow { background-color: #fde047; } /* 26-37 */
        .aqi-orange { background-color: #fdba74; } /* 38-75 */
        .aqi-red { background-color: #fca5a5; }    /* > 76 */
        
        .search-icon {
            filter: opacity(0.5);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-2xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden border-4 border-white">
        <!-- Header Section -->
        <div class="header-bg p-6 text-white text-center relative">
            <h1 class="text-3xl font-bold mb-4 tracking-wide text-shadow">รายงานคุณภาพอากาศ</h1>
            
            <div class="flex flex-wrap justify-between items-center text-sm md:text-base px-2">
                <div class="flex items-center gap-2">
                    <span id="currentDate">-- กุมภาพันธ์ ----</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-xl">🕒</span>
                    <span id="currentTime" class="font-bold text-xl">00.00 น.</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-red-500">📍</span>
                    <span>ปากเกร็ด ; นนทบุรี</span>
                </div>
            </div>
        </div>

        <!-- List Section -->
        <div class="p-6 space-y-3 bg-gray-100" id="dataList">
            <!-- Loading State -->
            <div class="text-center py-10 text-gray-500">กำลังโหลดข้อมูล...</div>
        </div>

        <!-- Footer Legend -->
        <div class="p-6 bg-white border-t border-gray-200">
            <div class="flex justify-between items-center mb-4">
                <div class="flex gap-1 flex-1 h-6 rounded-full overflow-hidden">
                    <div class="bg-cyan-300 w-1/5 text-[10px] flex items-center justify-center font-bold">15.0</div>
                    <div class="bg-green-400 w-1/5 text-[10px] flex items-center justify-center font-bold">25.0</div>
                    <div class="bg-yellow-400 w-1/5 text-[10px] flex items-center justify-center font-bold">37.5</div>
                    <div class="bg-orange-400 w-1/5 text-[10px] flex items-center justify-center font-bold">75.0</div>
                    <div class="bg-red-500 w-1/5 text-[10px] flex items-center justify-center font-bold text-white">> 75.0</div>
                </div>
            </div>
            <p class="text-[10px] text-gray-400 text-center">
                ข้อมูลโดย: https://www.cmuccdc.org/ และ https://www.iqair.com/
            </p>
        </div>
    </div>

    <script>
        // 1. Google Sheets Configuration
        // ขั้นตอน: ใน Google Sheets ไปที่ File > Share > Publish to web > เลือกแผ่นงาน และเลือกเป็น CSV > คัดลอกลิงก์มาวางที่นี่
        const GOOGLE_SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSorNjHzN5HQJE2ff2iL3IJgmaFEmblUTQJ5SPXpk76u8TbHecfgKHcQVrPDWcFKV-ykQj38mweU3_h/pub?gid=263375302&single=true&output=csv'; // วางลิงก์ CSV ตรงนี้

        // 2. Mock Data (ในกรณีที่ยังไม่มี Google Sheet จะแสดงข้อมูลจากรูปภาพก่อน)
        const initialData = [
            { location: "ถนนบอนด์สตรีท ปากทางติวานนท์", value: 30 },
            { location: "ถนนบอนด์สตรีท โซน D", value: 27 },
            { location: "ถนนบอนด์สตรีท ซอย 8", value: 28 },
            { location: "มหาวิทยาลัยสุโขทัยธรรมาธิราช", value: 31 },
            { location: "ถนนแจ้งวัฒนะปากเกร็ด 39 (P1)", value: 37 },
            { location: "สวนสมเด็จพระศรีนครินทร์", value: 29 },
            { location: "โรงเรียนวัดผาสุกมณีจักร", value: 25 },
            { location: "แยกไฟแดง IF ( Impact Forum)", value: 28 },
            { location: "ศูนย์แสดงสินค้าอิมแพ็ค", value: 28 },
            { location: "อาคาร Bangkok Land", value: 27 },
            { location: "Popular Condo", value: 28 }
        ];

        // 3. Update Date & Time
        function updateDateTime() {
            const now = new Date();
            const thaiMonths = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
            
            const day = String(now.getDate()).padStart(2, '0');
            const month = thaiMonths[now.getMonth()];
            const year = now.getFullYear() + 543;
            const time = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', hour12: false });

            document.getElementById('currentDate').innerText = `${day} ${month} ${year}`;
            document.getElementById('currentTime').innerText = `${time} น.`;
        }

        // 4. Color Logic
        function getColorClass(value) {
            if (value <= 15) return 'aqi-blue';
            if (value <= 25) return 'aqi-green';
            if (value <= 37) return 'aqi-yellow';
            if (value <= 75) return 'aqi-orange';
            return 'aqi-red';
        }

        // 5. Render List
        function renderData(data) {
            const listContainer = document.getElementById('dataList');
            listContainer.innerHTML = '';

            data.forEach(item => {
                const colorClass = getColorClass(item.value);
                
                const row = document.createElement('div');
                row.className = 'flex items-center gap-2 group';
                row.innerHTML = `
                    <div class="w-4 h-4 rounded-full bg-black shadow-inner"></div>
                    <div class="${colorClass} w-24 md:w-32 py-2 px-3 rounded-full text-center font-bold shadow-sm border border-gray-200">
                        ${item.value} µg/m3
                    </div>
                    <div class="${colorClass} flex-1 py-2 px-4 rounded-full font-medium shadow-sm border border-gray-200 flex justify-between items-center">
                        <span class="truncate">${item.location}</span>
                        <span class="text-xs">🔍</span>
                    </div>
                `;
                listContainer.appendChild(row);
            });
        }

        // 6. Fetch Data from Google Sheets (Optional)
        async function fetchSheetData() {
            if (!GOOGLE_SHEET_CSV_URL) {
                renderData(initialData);
                return;
            }

            try {
                const response = await fetch(GOOGLE_SHEET_CSV_URL);
                const text = await response.text();
                const rows = text.split('\n').slice(1); // ข้ามหัวตาราง
                
                const data = rows.map(row => {
                    const columns = row.split(',');
                    return {
                        location: columns[0]?.trim(),
                        value: parseFloat(columns[1]) || 0
                    };
                }).filter(item => item.location);

                renderData(data);
            } catch (error) {
                console.error("Error fetching data:", error);
                renderData(initialData); // Fallback
            }
        }

        // Initialize
        setInterval(updateDateTime, 1000);
        updateDateTime();
        fetchSheetData();

        // Refresh data every 5 minutes
        setInterval(fetchSheetData, 300000);

    </script>
</body>
</html>
